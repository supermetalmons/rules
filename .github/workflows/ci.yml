name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - mons-npm-publish-lock
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - run: npm ci --engine-strict
      - run: npm run check
